<!DOCTYPE html>
<html>
<head>
    <title>Map Sandbox</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; }

        .ui {
            position: fixed;
            top: 10px; left: 10px;
            z-index: 10;
            background: #111;
            padding: 10px;
            border-radius: 8px;
        }

        button { margin: 2px; }

        #debugPanel{
            position:fixed;
            top:10px;
            right:10px;
            background:#000;
            color:#0f0;
            font-family:monospace;
            font-size:12px;
            padding:10px;
            border-radius:8px;
            z-index:20;
            max-width:240px;
        }
    </style>
</head>
<body>

<div class="ui">
    <button onclick="setColor('yellow')">Yellow</button>
    <button onclick="setColor('red')">Red</button>
    <button onclick="setColor('blue')">Blue</button>
    <button onclick="setColor('green')">Green</button>
    <button onclick="setEraser()">Eraser</button>
    <button onclick="resetMap()">Reset</button>
</div>

<div id="debugPanel"></div>
<canvas id="mapCanvas"></canvas>

<script>

const canvas = document.getElementById("mapCanvas");
const ctx = canvas.getContext("2d");
const debugPanel = document.getElementById("debugPanel");

const baseCanvas = document.createElement("canvas");
const baseCtx = baseCanvas.getContext("2d");

const renderCanvas = document.createElement("canvas");
const renderCtx = renderCanvas.getContext("2d");

const img = new Image();
img.src = "provinces.png";

let zoom = 1;
let ownership = {};
let eraserMode = false;

const COLORS = {
    yellow: [255,255,0],
    red: [255,0,0],
    blue: [0,120,255],
    green: [0,200,0]
};

let selectedColor = "yellow";

function setColor(c){ selectedColor=c; eraserMode=false; }
function setEraser(){ eraserMode=true; }
function resetMap(){ ownership={}; draw(); }

img.onload = () => {
    baseCanvas.width = img.width;
    baseCanvas.height = img.height;
    baseCtx.drawImage(img, 0, 0);

    renderCanvas.width = img.width;
    renderCanvas.height = img.height;

    fitToScreen();
    draw();
};

function fitToScreen(){
    zoom = Math.min(window.innerWidth/img.width, window.innerHeight/img.height);
    canvas.width = img.width * zoom;
    canvas.height = img.height * zoom;
}

window.addEventListener("resize", ()=>{fitToScreen(); draw();});

canvas.addEventListener("click", e=>{
    const rect = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX-rect.left)/zoom);
    const y = Math.floor((e.clientY-rect.top)/zoom);

    const p = baseCtx.getImageData(x,y,1,1).data;
    const key = `${p[0]},${p[1]},${p[2]},${p[3]}`;

    if(eraserMode) delete ownership[key];
    else ownership[key]=selectedColor;

    draw();
});

function draw(){
    ctx.setTransform(zoom,0,0,zoom,0,0);
    ctx.clearRect(0,0,img.width,img.height);

    drawOwnership();
    ctx.drawImage(renderCanvas,0,0);

    ctx.setTransform(1,0,0,1,0,0);
    drawBorders();
    drawLabels();
}

function drawOwnership(){
    const baseData = baseCtx.getImageData(0,0,baseCanvas.width,baseCanvas.height).data;
    const imageData = renderCtx.createImageData(baseCanvas.width, baseCanvas.height);
    const data = imageData.data;

    for(let i=0;i<baseData.length;i+=4){
        const key = `${baseData[i]},${baseData[i+1]},${baseData[i+2]},${baseData[i+3]}`;
        const c = ownership[key] ? COLORS[ownership[key]] : [180,180,180];
        data[i]=c[0]; data[i+1]=c[1]; data[i+2]=c[2]; data[i+3]=255;
    }

    renderCtx.putImageData(imageData,0,0);
}

function drawBorders(){
    const w=baseCanvas.width, h=baseCanvas.height;
    const data=baseCtx.getImageData(0,0,w,h).data;

    function p(x,y){
        if(x<0||y<0||x>=w||y>=h) return "__edge__";
        const i=(y*w+x)*4;
        return `${data[i]},${data[i+1]},${data[i+2]},${data[i+3]}`;
    }

    function c(x,y){
        return ownership[p(x,y)] || "__neutral__";
    }

    ctx.beginPath();
    for(let y=0;y<h;y++){
        for(let x=0;x<w;x++){
            if(p(x,y)!==p(x+1,y)){
                ctx.moveTo((x+1)*zoom,y*zoom);
                ctx.lineTo((x+1)*zoom,(y+1)*zoom);
            }
            if(p(x,y)!==p(x,y+1)){
                ctx.moveTo(x*zoom,(y+1)*zoom);
                ctx.lineTo((x+1)*zoom,(y+1)*zoom);
            }
        }
    }
    ctx.strokeStyle="rgba(0,0,0,0.25)";
    ctx.lineWidth=1;
    ctx.stroke();

    ctx.beginPath();
    for(let y=0;y<h;y++){
        for(let x=0;x<w;x++){
            if(c(x,y)!==c(x+1,y)){
                ctx.moveTo((x+1)*zoom,y*zoom);
                ctx.lineTo((x+1)*zoom,(y+1)*zoom);
            }
            if(c(x,y)!==c(x,y+1)){
                ctx.moveTo(x*zoom,(y+1)*zoom);
                ctx.lineTo((x+1)*zoom,(y+1)*zoom);
            }
        }
    }
    ctx.strokeStyle="black";
    ctx.lineWidth=4;
    ctx.stroke();
}

function resamplePath(path, count){

	const lengths = [0];

	for (let i = 1; i < path.length; i++) {
		const dx = path[i][0] - path[i - 1][0];
		const dy = path[i][1] - path[i - 1][1];
		lengths[i] = lengths[i - 1] + Math.hypot(dx, dy);
	}

    const total=lengths[lengths.length-1];
    const step=total/(count-1);

    const result=[];
    let j=0;

    for(let i=0;i<count;i++){
        const target=i*step;

        while(j < lengths.length-2 && lengths[j+1] < target) j++;

        const t=(target-lengths[j])/(lengths[j+1]-lengths[j]||1);

        const x=path[j][0]*(1-t)+path[j+1][0]*t;
        const y=path[j][1]*(1-t)+path[j+1][1]*t;

        result.push([x,y]);
    }

    return result;
}
function drawLabels(){

    debugPanel.innerHTML = "";

    const w=baseCanvas.width, h=baseCanvas.height;
    const data=baseCtx.getImageData(0,0,w,h).data;

    function owner(x,y){
        if(x<0||y<0||x>=w||y>=h) return "__neutral__";
        const i=(y*w+x)*4;
        const key=`${data[i]},${data[i+1]},${data[i+2]},${data[i+3]}`;
        return ownership[key]||"__neutral__";
    }

    const groups={};

    for(let y=0;y<h;y++){
        for(let x=0;x<w;x++){
            const o=owner(x,y);
            if(o==="__neutral__") continue;
            if(!groups[o]) groups[o]=[];
            groups[o].push([x,y]);
        }
    }

    function computeDistanceField(ptsSet){
        const field = new Map();
        const queue = [];

        for(const key of ptsSet){
            const [x,y] = key.split(",").map(Number);

            let edge=false;
            for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
                if(!ptsSet.has((x+dx)+","+(y+dy))){
                    edge=true;
                    break;
                }
            }

            if(edge){
                field.set(key,0);
                queue.push([x,y]);
            } else {
                field.set(key,Infinity);
            }
        }

        while(queue.length){
            const [x,y]=queue.shift();
            const d=field.get(x+","+y);

            for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
                const nx=x+dx, ny=y+dy;
                const nk=nx+","+ny;

                if(field.has(nk)){
                    if(field.get(nk) > d+1){
                        field.set(nk,d+1);
                        queue.push([nx,ny]);
                    }
                }
            }
        }

        return field;
    }
	function computeSpine(pts){

		// --- compute centroid ---
		let cx = 0, cy = 0;
		for(const [x,y] of pts){
			cx += x;
			cy += y;
		}
		cx /= pts.length;
		cy /= pts.length;

		// --- compute covariance matrix ---
		let xx=0, xy=0, yy=0;

		for(const [x,y] of pts){
			const dx = x - cx;
			const dy = y - cy;

			xx += dx*dx;
			xy += dx*dy;
			yy += dy*dy;
		}

		// --- principal direction (eigenvector) ---
		const theta = 0.5 * Math.atan2(2*xy, xx - yy);
		const dir = [Math.cos(theta), Math.sin(theta)];

		// --- project all points onto axis ---
		const projected = pts.map(p=>{
			const dx = p[0] - cx;
			const dy = p[1] - cy;
			return dx*dir[0] + dy*dir[1];
		});

		const min = Math.min(...projected);
		const max = Math.max(...projected);

		// --- sample points along axis ---
		const samples = 80;
		const path = [];

		for(let i=0;i<samples;i++){
			const t = min + (i/(samples-1))*(max-min);

			// point on axis
			const x = cx + dir[0]*t;
			const y = cy + dir[1]*t;

			path.push([x,y]);
		}

		return path;
	}
	

    function resamplePath(path, count){

        const lengths=[0];

        for(let i=1;i<path.length;i++){
            const dx=path[i][0]-path[i-1][0];
            const dy=path[i][1]-path[i-1][1];
            lengths[i]=lengths[i-1]+Math.hypot(dx,dy);
        }

        const total=lengths[lengths.length-1];
        const step=total/(count-1);

        const result=[];
        let j=0;

        for(let i=0;i<count;i++){
            const target=i*step;

            while(j < lengths.length-2 && lengths[j+1] < target) j++;

            const t=(target-lengths[j])/(lengths[j+1]-lengths[j]||1);

            const x=path[j][0]*(1-t)+path[j+1][0]*t;
            const y=path[j][1]*(1-t)+path[j+1][1]*t;

            result.push([x,y]);
        }

        return result;
    }

    for(const o in groups){

        const pts = groups[o];
        if(pts.length < 200) continue;

        let text = o.toUpperCase();

        const ptsSet = new Set(pts.map(p=>p[0]+","+p[1]));
        const field = computeDistanceField(ptsSet);

		let spine = computeSpine(pts);
		
		ctx.save();
		ctx.setTransform(zoom,0,0,zoom,0,0);

		ctx.strokeStyle = "cyan";
		ctx.lineWidth = 2;
		ctx.beginPath();
		for(let i=0;i<spine.length;i++){
			const [x,y] = spine[i];
			if(i===0) ctx.moveTo(x, y);
			else ctx.lineTo(x, y);
		}
		ctx.stroke();

		ctx.restore();

		// compute local tangent → normal push
		spine = spine.map((p, i) => {
			const [x, y] = p;

			const key = Math.round(x) + "," + Math.round(y);
			const d = field.get(key) || 0;
			const push = Math.min(d * 0.12, 4);

			// compute tangent
			let dx = 0, dy = 0;

			if (i < spine.length - 1) {
				dx = spine[i + 1][0] - x;
				dy = spine[i + 1][1] - y;
			} else if (i > 0) {
				dx = x - spine[i - 1][0];
				dy = y - spine[i - 1][1];
			}

			const tanLen = Math.hypot(dx, dy) || 1;

			// normal from tangent
			const nx_local = -dy / tanLen;
			const ny_local = dx / tanLen;

			return [
				x + nx_local * push,
				y + ny_local * push
			];
		});

		spine = resamplePath(spine, 80);
		
		// 🔥 HEAVY smoothing (this is missing)
		for(let k=0;k<6;k++){
			for(let i=1;i<spine.length-1;i++){
				spine[i][0]=(spine[i-1][0]+spine[i][0]+spine[i+1][0])/3;
				spine[i][1]=(spine[i-1][1]+spine[i][1]+spine[i+1][1])/3;
			}
		}
		
		// 🔥 REPLACE spine with cubic Bézier curve

	// project deep points along PCA axis
	const axis = computeSpine(pts); // reuse direction
	const dir = [
		axis[axis.length-1][0] - axis[0][0],
		axis[axis.length-1][1] - axis[0][1]
	];

	// score deep interior points along axis
	const deepPtsArr = [...ptsSet]
		.map(k => {
			const [x,y] = k.split(",").map(Number);
			const d = field.get(k);
			const proj = x*dir[0] + y*dir[1];
			return {x,y,d,proj};
		})
		.sort((a,b)=>b.d - a.d);

	// pick endpoints from deep structure, not extremes
	// use ALL points for endpoints (not just deep ones)
	const projectedAll = [...ptsSet]
		.map(k => {
			const [x,y] = k.split(",").map(Number);
			return {
				x,y,
				proj: x * dir[0] + y * dir[1]
			};
		})
		.sort((a,b)=>a.proj - b.proj);

	// TRUE endpoints from full shape (not interior)
	let thickness = 0;
	for(const key of ptsSet){
		thickness = Math.max(thickness, field.get(key));
	}
	// use distance field to avoid edges
	const interior = [...ptsSet]
		.map(k => {
			const [x,y] = k.split(",").map(Number);
			const d = field.get(k) || 0;
			return {
				x, y,
				proj: x * dir[0] + y * dir[1],
				d
			};
		})
		.filter(p => p.d > thickness * 0.3)   // <-- KEY LINE
		.sort((a,b)=>a.proj - b.proj);

	// fallback if something goes wrong
	if (interior.length < 10) return;

	// endpoints INSIDE the shape
	const p0p = interior[0];
	const p3p = interior[interior.length - 1];

	const p0 = [p0p.x, p0p.y];
	const p3 = [p3p.x, p3p.y];
				
		// find deepest interior points (forces curvature)
		const deepPts = [...ptsSet]
			.map(k => {
				const d = field.get(k);
				const [x,y] = k.split(",").map(Number);
				return {x,y,d};
			})
			.sort((a,b)=>b.d - a.d);

		// use high-distance points as curve anchors
		// project deep points along axis direction
		const projected = deepPtsArr
			.map(p => {
				return {
					x: p.x,
					y: p.y,
					proj: p.x * dir[0] + p.y * dir[1],
					d: p.d
				};
			})
			.sort((a,b)=>a.proj - b.proj);
		const sortedDeep = [...ptsSet]
			.map(k => {
				const [x,y] = k.split(",").map(Number);
				return {
					x, y,
					d: field.get(k) || 0,
					proj: x * dir[0] + y * dir[1]
				};
			})
			.filter(p => p.d > thickness * 0.5)   // only thick interior
			.sort((a,b)=>a.proj - b.proj);

		// midpoint between endpoints
		const mid = [
			(p0[0] + p3[0]) / 2,
			(p0[1] + p3[1]) / 2
		];

		// find deepest point near the middle of projection
		const centerCandidate = sortedDeep[Math.floor(sortedDeep.length / 2)];

		const center = [centerCandidate.x, centerCandidate.y];

		// direction from straight line midpoint → interior center
		const cx = center[0] - mid[0];
		const cy = center[1] - mid[1];

		const clen = Math.hypot(cx, cy) || 1;

		// normalize toward interior
		const nx_axis = cx / clen;
		const ny_axis = cy / clen;

		// controlled bend
		const bend = Math.min(thickness * 0.6, 40);

		// symmetric control points toward interior
		const p1 = [
			mid[0] + nx_axis * bend,
			mid[1] + ny_axis * bend
		];

		const p2 = [
			mid[0] + nx_axis * bend,
			mid[1] + ny_axis * bend
		];

		function pullTowardLine(p, a, b, strength = 0.5) {
			const dx = b[0] - a[0];
			const dy = b[1] - a[1];
			const len2 = dx*dx + dy*dy || 1;

			const t = ((p[0]-a[0])*dx + (p[1]-a[1])*dy) / len2;

			const proj = [
				a[0] + dx*t,
				a[1] + dy*t
			];

			return [
				p[0] * (1 - strength) + proj[0] * strength,
				p[1] * (1 - strength) + proj[1] * strength
			];
		}

		function bezier(t, p0, p1, p2, p3){
			const u = 1 - t;
			return [
				u*u*u*p0[0] + 3*u*u*t*p1[0] + 3*u*t*t*p2[0] + t*t*t*p3[0],
				u*u*u*p0[1] + 3*u*u*t*p1[1] + 3*u*t*t*p2[1] + t*t*t*p3[1]
			];
		}
		ctx.save();
		
		ctx.setTransform(zoom,0,0,zoom,0,0);

		ctx.strokeStyle = "magenta";
		ctx.lineWidth = 3;

		// draw actual bezier
		ctx.beginPath();
		ctx.moveTo(p0[0], p0[1]);
		ctx.bezierCurveTo(
			p1[0], p1[1],
			p2[0], p2[1],
			p3[0], p3[1]
		);
		ctx.stroke();

		// draw control points
		ctx.fillStyle = "red";
		for (const p of [p0,p1,p2,p3]) {
			ctx.beginPath();
			ctx.arc(p[0], p[1], 3, 0, Math.PI*2);
			ctx.fill();
		}

		ctx.restore();

		// rebuild spine as smooth curve
		const newSpine = [];
		for(let i=0;i<80;i++){
			const t = i/79;
			newSpine.push(bezier(t, p0, p1, p2, p3));
		}

		spine = newSpine;
		
		// --- trim unusable ends (THIS FIXES YOUR "G DRIFT") ---
		const MIN_DEPTH = thickness * 0.25;

		const trimmed = spine.filter(([x,y]) => {
			const key = Math.round(x)+","+Math.round(y);
			return (field.get(key) || 0) > MIN_DEPTH;
		});

		if (trimmed.length > 10) {
			spine = trimmed;
			spine = resamplePath(spine, 80); // re-uniform spacing
		}

		let fontSize = Math.max(40, Math.min(400, thickness * 4));

        ctx.font=`bold ${fontSize}px Georgia`;
        ctx.fillStyle="white";
        ctx.strokeStyle="black";

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
		// ================= CLEAN LABEL PLACEMENT =================

		// build cumulative length
		const cumulative = [0];

		for (let i = 1; i < spine.length; i++) {
			const dx = spine[i][0] - spine[i - 1][0];
			const dy = spine[i][1] - spine[i - 1][1];
			cumulative[i] = cumulative[i - 1] + Math.hypot(dx, dy);
		}

		const totalLen = cumulative[cumulative.length - 1];

		// helper: point at distance
		function getPointAt(dist) {
			for (let i = 1; i < cumulative.length; i++) {
				if (cumulative[i] >= dist) {
					const a = spine[i - 1];
					const b = spine[i];

					const t = (dist - cumulative[i - 1]) / (cumulative[i] - cumulative[i - 1] || 1);

					return [
						a[0] * (1 - t) + b[0] * t,
						a[1] * (1 - t) + b[1] * t,
						b[0] - a[0],
						b[1] - a[1]
					];
				}
			}
			return [...spine[spine.length - 1], 1, 0];
		}

		const valid = spine.map(([x,y], i) => {
			const key = Math.round(x)+","+Math.round(y);
			return (field.get(key) || 0) > MIN_DEPTH ? i : -1;
		}).filter(i => i !== -1);

		if (valid.length < 2) continue;

		const startIdx = valid[0];
		const endIdx = valid[valid.length - 1];

		const startDist = cumulative[startIdx];
		const endDist = cumulative[endIdx];
		const usableLen = endDist - startDist;

		// ===== TEXT MEASUREMENT
		const letters = text.split('');
		const widths = letters.map(ch => ctx.measureText(ch).width);
		const totalTextWidth = widths.reduce((a,b)=>a+b,0);

		// ===== SCALE ONLY IF NEEDED
		let scale = 1;
		if (totalTextWidth > usableLen) {
			scale = usableLen / totalTextWidth;
		}

		// ===== CENTER TEXT ON CURVE
		let dist = startDist + (usableLen - totalTextWidth * scale) / 2;

		// ===== DRAW LETTERS
		for (let i = 0; i < letters.length; i++) {

			const w = widths[i] * scale;

			dist += w / 2;

			const [x, y, dx, dy] = getPointAt(dist);

			const angle = Math.atan2(dy, dx);

			ctx.save();
			ctx.translate(x * zoom, y * zoom);
			ctx.rotate(angle);

			ctx.strokeText(letters[i], 0, 0);
			ctx.fillText(letters[i], 0, 0);

			ctx.restore();

			dist += w / 2;
		}
	}
}
</script>
</body>
</html>
